{% extends "base.html" %}

{% block contents %}
<style>
  :root{
    --q-start: 300px;  
    --q-gap: 80px;    
    --opt-w: 500px;   
    --opt-h: 64px;    
    --opt-pad-x: 16px;
  }

  body { margin: 0; }

  .quiz-page {
    width: 1920px;
    min-height: 2602px;
    margin: 0 auto;
    background: url("{{ url_for('static', filename='배경2-1.png') }}") top center no-repeat;
    background-size: 1920px auto;
    position: relative;
  }

  .quiz-content {
    width: 1200px;
    margin: 0 auto;
    padding-top: 70px;
  }

  .intro {
    font-size: 22px;
    line-height: 1.6;
    color: #ffffff;
    margin: 0 0 var(--q-start);
    text-align: center;
    font-weight: 600;
  }

  .question {
    margin: var(--q-gap) 0;
    padding-bottom: 80px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    text-align: center;
  }

  .q-text {
    font-size: 24px;
    font-weight: 700;
    color: #535353;
    margin-bottom: 20px;
  }

  .answer-box {
    background: none;
    border: 0;
    padding: 0;
  }

  .options {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .option {
    flex: 0 0 var(--opt-w);
    width: var(--opt-w);
    height: var(--opt-h); 
    min-width: 180px;
  }

  .option label {
    width: 100%;
    height: 100%;
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 12px;
    padding: 0 var(--opt-pad-x);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    color: #535353;
    transition: transform .08s ease;
  }

  .option label:hover {
    transform: translateY(-2px);
  }

  .option input[type="radio"] {
    display: none;
  }

  .option input[type="radio"]:checked + span {
    color: #68a680;
  }

  .option input[type="radio"]:checked + span {
    border-color: #68a680;
    box-shadow: 0 0 0 3px rgba(61,84,255,0.12) inset;
  }

  .nav-area {
    display: flex;
    justify-content: center;
    margin: 140px 0 160px;
  }

  .next-btn {
    background: #68a680;
    color: #fff;
    border: none;
    border-radius: 9999px;
    padding: 16px 60px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }

  .next-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  header, nav {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  @media (max-width: 1920px){
    body { overflow-x: auto; }
  }
</style>

<div class="quiz-page">
  <div class="quiz-content">
    <div class="intro">
      이 테스트는 21문항으로 구성되어 있으며 제일 위쪽에 진행도가 표시됩니다.
    </div>

    <form id="quiz1Form" action="{{ url_for('quiz_page1') }}" method="POST">

      <!-- Q1 -->
      <section class="question">
        <div class="q-text">어떤 일을 시작할 때 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q1" value="A">
                <span>기꺼이 돈을 쓴다</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q1" value="B">
                <span>돈을 써야하는 일이면 거부감이 든다</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q2 -->
      <section class="question">
        <div class="q-text">여유돈이 생기면 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q2" value="A">
                <span>사고싶은게 떠오른다</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q2" value="B">
                <span>미래를 위해 저축한다</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q3 -->
      <section class="question">
        <div class="q-text">끌리는 물건을 봤을 때</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q3" value="A">
                <span>여유가 있지는 않지만 일단 산다</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q3" value="B">
                <span>지금 나에게는 사치라고 생각한다</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q4 -->
      <section class="question">
        <div class="q-text">내가 어떤 물건을 사는 이유는?</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q4" value="A">
                <span>갖고 싶은 마음에</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q4" value="B">
                <span>꼭 필요한 물건이라서</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q5 -->
      <section class="question">
        <div class="q-text">"나에게 주는 선물" 을 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q5" value="A">
                <span>자주 한다</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q5" value="B">
                <span>거의 하지 않는다</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q6 -->
      <section class="question">
        <div class="q-text">지름 후 나의 감정은?</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q6" value="A">
                <span>만족 > 후회</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q6" value="B">
                <span>후회 > 만족</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q7 -->
      <section class="question">
        <div class="q-text">돈을 쓸 때 나의 생각은?</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <label>
                <input type="radio" name="q7" value="A">
                <span>'지금 아니면 언제 사?'</span>
              </label>
            </div>
            <div class="option">
              <label>
                <input type="radio" name="q7" value="B">
                <span>'한 번 더 생각하자'</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <div class="nav-area">
        <button class="next-btn" type="submit">다음</button>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById("quiz1Form").addEventListener("submit", function(e){
  const names = Array.from(new Set(
    Array.from(this.querySelectorAll('input[type="radio"]')).map(r => r.name)
  ));
  const allAnswered = names.every(n => this.querySelector(`input[name="${n}"]:checked`));

  if (!allAnswered) {
    e.preventDefault();
    alert("안 푼 문제가 있습니다");
    const firstMissing = names.find(n => !this.querySelector(`input[name="${n}"]:checked`));
    if (firstMissing) {
      const el = this.querySelector(`input[name="${firstMissing}"]`);
      el && el.closest('.question')?.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
});
</script>
{% endblock contents %}
