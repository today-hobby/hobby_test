{% extends "base.html" %}

{% block contents %}
<style>
  :root{
    --q-start: 300px;  /* 첫 문항 시작 높이 */
    --q-gap: 80px;    /* 문항 간 간격 */
    /* 옵션 박스 고정 크기용 변수 (필요하면 숫자만 바꿔도 됨) */
    --opt-w: 500px;   /* 고정 폭 */
    --opt-h: 64px;    /* 고정 높이 */
    --opt-pad-x: 16px;
  }

  body { margin: 0; }

  /* 페이지 랩퍼 */
  .quiz-page {
    width: 1920px;
    min-height: 2475px;
    margin: 0 auto;
    background: url("{{ url_for('static', filename='배경2-3.png') }}") top center no-repeat;
    background-size: 1920px auto;
    position: relative;
  }

  /* 본문 컨텐츠 폭 */
  .quiz-content {
    width: 1200px;
    margin: 0 auto;
    padding-top: 180px; /* 안내문을 화면 위로 붙임 */
  }

  /* 질문 블록 */
  .question {
    margin: var(--q-gap) 0;
    padding-bottom: 80px; /* 구분선과 내용 간격 */
    border-bottom: 1px solid rgba(0,0,0,0.1); /* 얇고 연한 선 */
    text-align: center; /* 질문 가운데 정렬 */
  }

  .q-text {
    font-size: 24px;
    font-weight: 700;
    color: #535353;
    margin-bottom: 20px;
  }

  /* 답변 박스 (전체 배경 제거) */
  .answer-box {
    background: none;
    border: 0;
    padding: 0;
  }

  /* 옵션 영역 */
  .options {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap; /* 한 줄에 다 안 들어가면 자동 줄바꿈 */
  }

  /* 각 옵션만 불투명 흰 박스 */
  .option {
    flex: 0 0 var(--opt-w);
    width: var(--opt-w);
    height: var(--opt-h); 
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 12px;
    padding: 0 var(--opt-pad-x);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .08s ease;
    min-width: 180px;
  }
  .option:hover { transform: translateY(-2px); }

  /* 라디오 숨기고 라벨 클릭 가능 */
  .option input[type="radio"] { display: none; }
  .option label {
    display: -webkit-box;              /* WebKit 전용 멀티라인 말줄임 */
    display: box;                      /* 구형 표준 시도 */
    -webkit-box-orient: vertical;
    box-orient: vertical;

    -webkit-line-clamp: 2;              /* 크롬/사파리/엣지용 */
    line-clamp: 2;                      /* 표준 초안 */

    overflow: hidden;
    text-align: center;
    line-height: 1.3;
    white-space: normal;
    word-break: keep-all;  
    font-size: 18px;
    font-weight: 600;
    color: #535353;
    cursor: pointer;
  }

  /* 선택 시 스타일 */
  .option input[type="radio"]:checked + label {
    color: #68a680;
  }
  .option:has(input[type="radio"]:checked) {
    border-color: #68a680;
    box-shadow: 0 0 0 3px rgba(61,84,255,0.12) inset;
  }

  /* 하단 네비게이션 */
  .nav-area {
    display: flex;
    justify-content: center; /* 가운데 정렬 */
    margin: 140px 0 160px;
  }

 .next-btn {
    background: #68a680;
    color: #fff;
    border: none;              /* 테두리 제거 */
    border-radius: 9999px;     /* 타원형 (완전 둥글게) */
    padding: 16px 60px;        /* 가로 폭 넉넉하게 */
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }

  .next-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* 헤더 흰 라인 제거 */
  header, nav {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  @media (max-width: 1920px){
    body { overflow-x: auto; }
  }
</style>

<div class="quiz-page">
  <div class="quiz-content">

    <!-- 폼 -->
    <form id="quiz3Form" action="{{ url_for('quiz_page3') }}" method="POST">

      <!-- Q15 -->
      <section class="question">
        <div class="q-text">어떤 작업을 할 때 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q15_a" name="q15" value="A">
              <label for="q15_a">그 일에 완전히 몰입한다</label>
            </div>
            <div class="option">
              <input type="radio" id="q15_b" name="q15" value="B">
              <label for="q15_b">틈틈이 딴짓을 곁들인다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q16 -->
      <section class="question">
        <div class="q-text">아직 끝내지 못한 일이 남아있다면</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q16_a" name="q16" value="A">
              <label for="q16_a">끝내버려야 속이 편하다</label>
            </div>
            <div class="option">
              <input type="radio" id="q16_b" name="q16" value="B">
              <label for="q16_b">중간에 멈춰도 상관없다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q17 -->
      <section class="question">
        <div class="q-text">어떤 일에 대해 생각할 때 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q17_a" name="q17" value="A">
              <label for="q17_a">한 생각에 오래 머문다</label>
            </div>
            <div class="option">
              <input type="radio" id="q17_b" name="q17" value="B">
              <label for="q17_b">쉽게 다른 생각을 한다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q18 -->
      <section class="question">
        <div class="q-text">콘텐츠를 볼 때 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q18_a" name="q18" value="A">
              <label for="q18_a">끝까지 봐야한다</label>
            </div>
            <div class="option">
              <input type="radio" id="q18_b" name="q18" value="B">
              <label for="q18_b">금세 다른 콘텐츠를 탐색한다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q19 -->
      <section class="question">
        <div class="q-text">시간 가는 줄 모르게 몰입하는 경험이</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q19_a" name="q19" value="A">
              <label for="q19_a">자주있다</label>
            </div>
            <div class="option">
              <input type="radio" id="q19_b" name="q19" value="B">
              <label for="q19_b">그런 경험이 드물다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q20 -->
      <section class="question">
        <div class="q-text">집중이 필요한 활동을 하는 것이</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q20_a" name="q20" value="A">
              <label for="q20_a">재미있다</label>
            </div>
            <div class="option">
              <input type="radio" id="q20_b" name="q20" value="B">
              <label for="q20_b">귀찮다고 느껴진다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q21 -->
      <section class="question">
        <div class="q-text">집중을 해야할 때</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q21_a" name="q21" value="A">
              <label for="q21_a">뿌듯함을 느끼고 싶어 적극 참여한다</label>
            </div>
            <div class="option">
              <input type="radio" id="q21_b" name="q21" value="B">
              <label for="q21_b">피곤해지니 피하고싶다</label>
            </div>
          </div>
        </div>
      </section>

      <div class="nav-area">
        <button class="next-btn" type="submit">결과 확인하기 ❯❯</button>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById("quiz3Form").addEventListener("submit", function(e){
  const names = Array.from(new Set(
    Array.from(this.querySelectorAll('input[type="radio"]')).map(r => r.name)
  ));
  const allAnswered = names.every(n => this.querySelector(`input[name="${n}"]:checked`));
  if (!allAnswered) {
    e.preventDefault();
    alert("안 푼 문제가 있습니다");
    const firstMissing = names.find(n => !this.querySelector(`input[name="${n}"]:checked`));
    if (firstMissing) {
      const el = this.querySelector(`input[name="${firstMissing}"]`);
      el && el.closest('.question')?.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
});
</script>

<script>
  // :has() 미지원 브라우저 대비
  document.querySelectorAll('.options').forEach(group => {
    group.addEventListener('change', e => {
      if (e.target && e.target.type === 'radio') {
        group.querySelectorAll('.option').forEach(o => o.classList.remove('checked'));
        const box = e.target.closest('.option');
        if (box) box.classList.add('checked');
      }
    });
  });
</script>
{% endblock contents %}
