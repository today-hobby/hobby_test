<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=42dot+Sans:wght@700&display=swap" rel="stylesheet">
    <title>Cardify</title>
    <style>
        .display-4 {
            font-family: "Rubik Mono One", serif;
            font-weight: 400;
            font-style: normal;
            color: #3D54FF;
        }

        .jumbotron {
            background-color: #2b2b2b;
        }

        .lead {
            font-weight: 450;
            font-size: 115%;
            color: white;
        }

        .upload {
            border-style: none;
            background-color: #ffffff;
            font-size: 95%;
            color: #48484c;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        .filter {
            border-style: none;
            background-color: #3D54FF;
            font-size: 95%;
            color: #ffffff;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            margin: 0 15%;
            font-family: "42dot Sans", serif;
        }

        .card {
            border: 2px solid #3D54FF;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.8);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }

        .image-container img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }

        .image-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            color: white;
            font-size: 16px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 0 0 4px 4px;
        }

        .card-title {
            font-size: 18px;
            margin: 10px 0;
            text-align: center;
        }

        .view-details {
            display: block;
            width: 100%;
            padding: 8px;
            background-color: #3D54FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 10px;
            font-size: 14px;
        }

        .view-details:hover {
            background-color: #2a3ccc;
            color: white;
            text-decoration: none;
        }

        .category {
            border-style: none;
            background-color: #272727;
            font-size: 90%;
            padding: 2.5%;
            color: white;
            margin: 4px;
        }

        .profile {
            margin-top: -1%;
            position: fixed;
            color: #3D54FF;
        }

        .box {
            width: 25%;
            display: flex;
            justify-content: flex-end;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="jumbotron">
        <div class="flex" style="display: flex; justify-content: flex-end;">
            <div class="box">
                <svg class="profile btn" xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor"
                    class="bi bi-person-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 s0" />
                    <path fill-rule="evenodd"
                        d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                </svg>
            </div>
        </div>

        <div class="container">
            <img src="/static/logo.png" width="85" height="75">
            <h1 class="display-4">Cardify</h1>
            <p class="lead">Cardify는 사람들의 창의적인 <b>아이디어</b>와 <b>소중한 이야기들</b>을 보다 <b>쉽고 빠르게</b> 접하도록 만든 플랫폼입니다.<br />
                Cardify에서는 알고리즘이 당신이 <b>원하는 이야기</b>들을 보여줄 것입니다.<br />
                다양한 사람들이 당신이 만든 카드를 보며 <b>공감</b>하고 <b>응원</b>할 것입니다.<br />
                지금 바로 가입해 <b>당신의 이야기</b>를 수많은 사람들에게 <b>쉽고 빠르게</b> 공유해보세요!</p>
            <button type="button" class="upload" onclick="location.href='/card/edit'">게시글 업로드</button>
        </div>
    </div>

    <div class="cards-container">
        {% for card in cards %}
        <div class="card">
            <div class="image-container">
                <img src="{{ card.image_paths[0] }}" alt="{{ card.title }}">
                <div class="image-text">{{ card.maintext[0] }}</div>
            </div>
            <h3 class="card-title">{{ card.title }}</h3>
            <a href="/card/view/{{ card._id }}" class="view-details">자세히 보기</a>
        </div>
        {% endfor %}
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
