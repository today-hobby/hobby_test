{% extends "base.html" %}

{% block contents %}
<style>
  :root{
    --q-start: 300px;  /* 첫 문항 시작 높이 */
    --q-gap: 80px;    /* 문항 간 간격 */
    /* 옵션 박스 고정 크기용 변수 (필요하면 숫자만 바꿔도 됨) */
    --opt-w: 500px;   /* 고정 폭 */
    --opt-h: 64px;    /* 고정 높이 */
    --opt-pad-x: 16px;
  }

  body { margin: 0; }

  /* 페이지 랩퍼 */
  .quiz-page {
    width: 1920px;
    min-height: 2475px;
    margin: 0 auto;
    background: url("{{ url_for('static', filename='배경2-2.png') }}") top center no-repeat;
    background-size: 1920px auto;
    position: relative;
  }

  /* 본문 컨텐츠 폭 */
  .quiz-content {
    width: 1200px;
    margin: 0 auto;
    padding-top: 180px; /* 안내문을 화면 위로 붙임 */
  }

  /* 질문 블록 */
  .question {
    margin: var(--q-gap) 0;
    padding-bottom: 80px; /* 구분선과 내용 간격 */
    border-bottom: 1px solid rgba(0,0,0,0.1); /* 얇고 연한 선 */
    text-align: center; /* 질문 가운데 정렬 */
  }

  .q-text {
    font-size: 24px;
    font-weight: 700;
    color: #535353;
    margin-bottom: 20px;
  }

  /* 답변 박스 (전체 배경 제거) */
  .answer-box {
    background: none;
    border: 0;
    padding: 0;
  }

  /* 옵션 영역 */
  .options {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap; /* 한 줄에 다 안 들어가면 자동 줄바꿈 */
  }

  /* 각 옵션만 불투명 흰 박스 */
  .option {
    flex: 0 0 var(--opt-w);
    width: var(--opt-w);
    height: var(--opt-h); 
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 12px;
    padding: 0 var(--opt-pad-x);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .08s ease;
    min-width: 180px;
  }
  .option:hover { transform: translateY(-2px); }

  /* 라디오 숨기고 라벨 클릭 가능 */
  .option input[type="radio"] { display: none; }
  .option label {
    display: -webkit-box;              /* WebKit 전용 멀티라인 말줄임 */
    display: box;                      /* 구형 표준 시도 */
    -webkit-box-orient: vertical;
    box-orient: vertical;

    -webkit-line-clamp: 2;              /* 크롬/사파리/엣지용 */
    line-clamp: 2;                      /* 표준 초안 */

    overflow: hidden;
    text-align: center;
    line-height: 1.3;
    white-space: normal;
    word-break: keep-all;  
    font-size: 18px;
    font-weight: 600;
    color: #535353;
    cursor: pointer;
  }

  /* 선택 시 스타일 */
  .option input[type="radio"]:checked + label {
    color: #68a680;
  }
  .option:has(input[type="radio"]:checked) {
    border-color: #68a680;
    box-shadow: 0 0 0 3px rgba(61,84,255,0.12) inset;
  }

  /* 하단 네비게이션 */
  .nav-area {
    display: flex;
    justify-content: center; /* 가운데 정렬 */
    margin: 140px 0 160px;
  }

 .next-btn {
    background: #68a680;
    color: #fff;
    border: none;              /* 테두리 제거 */
    border-radius: 9999px;     /* 타원형 (완전 둥글게) */
    padding: 16px 60px;        /* 가로 폭 넉넉하게 */
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }

  .next-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* 헤더 흰 라인 제거 */
  header, nav {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  @media (max-width: 1920px){
    body { overflow-x: auto; }
  }
</style>

<div class="quiz-page">
  <div class="quiz-content">

    <!-- 폼 -->
    <form id="quiz2Form" action="{{ url_for('quiz_page2') }}" method="POST">

      <!-- Q8 -->
      <section class="question">
        <div class="q-text">오랜 시간 침대에 누워있으면 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q8_a" name="q8" value="A">
              <label for="q8_a">지루하고 답답하다</label>
            </div>
            <div class="option">
              <input type="radio" id="q8_b" name="q8" value="B">
              <label for="q8_b">편안하고 좋다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q9 -->
      <section class="question">
        <div class="q-text">하루 일정이 없으면 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q9_a" name="q9" value="A">
              <label for="q9_a">뭐라도 하러 나가는 편이다</label>
            </div>
            <div class="option">
              <input type="radio" id="q9_b" name="q9" value="B">
              <label for="q9_b">침대와 함께하는 편이다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q10 -->
      <section class="question">
        <div class="q-text">혼자있을 때 "심심하다"는 생각이</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q10_a" name="q10" value="A">
              <label for="q10_a">자주 든다</label>
            </div>
            <div class="option">
              <input type="radio" id="q10_b" name="q10" value="B">
              <label for="q10_b">거의 들지 않는다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q11 -->
      <section class="question">
        <div class="q-text">여행지에서 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q11_a" name="q11" value="A">
              <label for="q11_a">일찍 나가서 많이 돌아다니는 것을 선호한다</label>
            </div>
            <div class="option">
              <input type="radio" id="q11_b" name="q11" value="B">
              <label for="q11_b">느긋한 일정을 선호한다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q12 -->
      <section class="question">
        <div class="q-text">행사가 체험 부스를 봤을 때 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q12_a" name="q12" value="A">
              <label for="q12_a">최대한 골고루 참여한다</label>
            </div>
            <div class="option">
              <input type="radio" id="q12_b" name="q12" value="B">
              <label for="q12_b">참여하지 않는다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q13 -->
      <section class="question">
        <div class="q-text">에너지를 쓰지 않아 넘칠 때</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q13_a" name="q13" value="A">
              <label for="q13_a">어서 쓰러 나가고싶다</label>
            </div>
            <div class="option">
              <input type="radio" id="q13_b" name="q13" value="B">
              <label for="q13_b">계속 아끼고싶다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q14 -->
      <section class="question">
        <div class="q-text">외출 후 집에 돌아왔을 때</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q14_a" name="q14" value="A">
              <label for="q14_a">다음 외출이 기다려진다</label>
            </div>
            <div class="option">
              <input type="radio" id="q14_b" name="q14" value="B">
              <label for="q14_b">한동안 휴식을 취하고싶다</label>
            </div>
          </div>
        </div>
      </section>

      <div class="nav-area">
        <button class="next-btn" type="submit">다음</button>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById("quiz2Form").addEventListener("submit", function(e){
  const names = Array.from(new Set(
    Array.from(this.querySelectorAll('input[type="radio"]')).map(r => r.name)
  ));
  const allAnswered = names.every(n => this.querySelector(`input[name="${n}"]:checked`));
  if (!allAnswered) {
    e.preventDefault();
    alert("안 푼 문제가 있습니다");
    const firstMissing = names.find(n => !this.querySelector(`input[name="${n}"]:checked`));
    if (firstMissing) {
      const el = this.querySelector(`input[name="${firstMissing}"]`);
      el && el.closest('.question')?.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
});
</script>

<script>
  // :has() 미지원 브라우저 대비
  document.querySelectorAll('.options').forEach(group => {
    group.addEventListener('change', e => {
      if (e.target && e.target.type === 'radio') {
        group.querySelectorAll('.option').forEach(o => o.classList.remove('checked'));
        const box = e.target.closest('.option');
        if (box) box.classList.add('checked');
      }
    });
  });
</script>
{% endblock contents %}
