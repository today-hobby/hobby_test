<style>
  .quiz-page{
    width: 1920px;
    min-height: 4578px;
    margin: 0 auto;
    background: url("{{ url_for('static', filename='배경2-2.png') }}") top center no-repeat;
    background-size: 1920px auto;
    position: relative;
  }
  .quiz-content{
    width: 1200px;
    margin: 0 auto;
    padding-top: 180px;  /* 페이지1과 줄 맞춤 */
  }
  .question{ margin: 120px 0; }
  .q-text{ font-size:24px; font-weight:700; color:#333; margin-bottom:20px; }

  .answer-box{ background: rgba(255,255,255,0.9); border-radius:14px; padding:22px; }
  .options{ display:flex; gap:24px; }
  .option{ flex:1 1 0; background:#fff; border:1px solid #e3e3e3; border-radius:12px; padding:18px 16px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .08s ease; }
  .option:hover{ transform: translateY(-2px); }
  .option input[type="radio"]{ display:none; }
  .option label{ font-size:18px; font-weight:600; color:#444; cursor:pointer; }
  .option input[type="radio"]:checked + label{ color:#3D54FF; }

  .nav-area{ display:flex; justify-content:flex-end; margin:140px 0 160px; }
  .next-btn{ background:#3D54FF; color:#fff; border:0; border-radius:12px; padding:16px 32px; font-size:18px; font-weight:700; cursor:pointer; }

  @media (max-width: 1920px){
    body{ overflow-x:auto; }
  }
</style>
