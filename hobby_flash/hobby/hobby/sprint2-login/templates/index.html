{% extends "base.html" %}

{% block user %}
    <div class="welcome-container">
        {% if session['uid'] %}
            <p class="welcome-message">Welcome, {{ session['uid'] }}</p>
            <a href="{{ url_for('quiz_page1') }}" class="btn btn-dark btn-sm">내 취미 mbti 검사하러가기</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-dark btn-sm">Login</a>
        {% endif %}
    </div>
{% endblock user %}

{% block contents %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">

    <style>
        .d {
            font-family: "Rubik Mono One", serif;
            font-weight: 400;
            font-style: normal;
        }

        .container {
            background-color: rgb(255, 255, 255);
            height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .input-group {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .form-control {
            font-size: 1rem;
            padding: 10px;
        }

        .btn {
            width: 10%;
            background-color: #5669fb;
            color: white;
            box-sizing: border-box;
            padding: 15px;
            margin: 8px;
            height: 40px;
            padding: 10px;
            border-radius: 40px;
        }

        .alert {
            display: none;
        }

        .col-lg-4 {
            padding: 20px;
        }

        .button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* 중앙 정렬을 위한 스타일 */
        .welcome-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .welcome-message {
            font-size: 3rem; /* 글씨 크기 크게 */
            color: #3D54FF;
            margin-bottom: 20px;
        }


    </style>

</head>

<body>
    <div>
        <div style="float: left">
            <img src="../static/dfs.png" width="85" height="75" />
        </div>

        <div class="d">
            <font size="7" color="#3D54FF">CARDIFY</font>
        </div>

       

    </div>

</body>
</html>
{% endblock contents %}
