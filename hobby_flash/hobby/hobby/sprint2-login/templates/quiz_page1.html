{% extends "base.html" %}

{% block contents %}
<style>
  :root{
    --q-start: 300px;  /* 첫 문항 시작 높이 */
    --q-gap: 80px;    /* 문항 간 간격 */
    /* 옵션 박스 고정 크기용 변수 (필요하면 숫자만 바꿔도 됨) */
    --opt-w: 500px;   /* 고정 폭 */
    --opt-h: 64px;    /* 고정 높이 */
    --opt-pad-x: 16px;
  }

  body { margin: 0; }

  /* 페이지 랩퍼 */
  .quiz-page {
    width: 1920px;
    min-height: 2602px;
    margin: 0 auto;
    background: url("{{ url_for('static', filename='배경2-1.png') }}") top center no-repeat;
    background-size: 1920px auto;
    position: relative;
  }

  /* 본문 컨텐츠 폭 */
  .quiz-content {
    width: 1200px;
    margin: 0 auto;
    padding-top: 70px; /* 안내문을 화면 위로 붙임 */
  }

  /* 상단 안내 문구 */
  .intro {
    font-size: 22px;
    line-height: 1.6;
    color: #ffffff;
    margin: 0 0 var(--q-start);
    text-align: center;
    font-weight: 600;
  }

  /* 질문 블록 */
  .question {
    margin: var(--q-gap) 0;
    padding-bottom: 80px; /* 구분선과 내용 간격 */
    border-bottom: 1px solid rgba(0,0,0,0.1); /* 얇고 연한 선 */
    text-align: center; /* 질문 가운데 정렬 */
  }

  .q-text {
    font-size: 24px;
    font-weight: 700;
    color: #535353;
    margin-bottom: 20px;
  }

  /* 답변 박스 (전체 배경 제거) */
  .answer-box {
    background: none;
    border: 0;
    padding: 0;
  }

  /* 옵션 영역 */
  .options {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap; /* 한 줄에 다 안 들어가면 자동 줄바꿈 */
  }

  /* 각 옵션만 불투명 흰 박스 */
  .option {
    flex: 0 0 var(--opt-w);
    width: var(--opt-w);
    height: var(--opt-h); 
    background: #ffffff;
    border: 1px solid #e3e3e3;
    border-radius: 12px;
    padding: 0 var(--opt-pad-x);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .08s ease;
    min-width: 180px;
  }
  .option:hover { transform: translateY(-2px); }

  /* 라디오 숨기고 라벨 클릭 가능 */
  .option input[type="radio"] { display: none; }
  .option label {
    display: -webkit-box;              /* WebKit 전용 멀티라인 말줄임 */
    display: box;                      /* 구형 표준 시도 */
    -webkit-box-orient: vertical;
    box-orient: vertical;

    -webkit-line-clamp: 2;              /* 크롬/사파리/엣지용 */
    line-clamp: 2;                      /* 표준 초안 */

    overflow: hidden;
    text-align: center;
    line-height: 1.3;
    white-space: normal;
    word-break: keep-all;  
    font-size: 18px;
    font-weight: 600;
    color: #535353;
    cursor: pointer;
  }

  /* 선택 시 스타일 */
  .option input[type="radio"]:checked + label {
    color: #68a680;
  }
  .option:has(input[type="radio"]:checked) {
    border-color: #68a680;
    box-shadow: 0 0 0 3px rgba(61,84,255,0.12) inset;
  }

  /* 하단 네비게이션 */
  .nav-area {
    display: flex;
    justify-content: center; /* 가운데 정렬 */
    margin: 140px 0 160px;
  }

 .next-btn {
    background: #68a680;
    color: #fff;
    border: none;              /* 테두리 제거 */
    border-radius: 9999px;     /* 타원형 (완전 둥글게) */
    padding: 16px 60px;        /* 가로 폭 넉넉하게 */
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }

  .next-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* 헤더 흰 라인 제거 */
  header, nav {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  @media (max-width: 1920px){
    body { overflow-x: auto; }
  }
</style>

<div class="quiz-page">
  <div class="quiz-content">

    <!-- 상단 안내 멘트 -->
    <div class="intro">
      이 테스트는 21문항으로 구성되어 있으며 제일 위쪽에 진행도가 표시됩니다.
    </div>

    <!-- 폼 -->
    <form id="quiz1Form" action="{{ url_for('quiz_page1') }}" method="POST">

      <!-- Q1 -->
      <section class="question">
        <div class="q-text">어떤 일을 시작할 때 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q1_a" name="q1" value="A">
              <label for="q1_a">기꺼이 돈을 쓴다</label>
            </div>
            <div class="option">
              <input type="radio" id="q1_b" name="q1" value="B">
              <label for="q1_b">돈을 써야하는 일이면 거부감이 든다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q2 -->
      <section class="question">
        <div class="q-text">여유돈이 생기면 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q2_a" name="q2" value="A">
              <label for="q2_a">사고싶은게 떠오른다</label>
            </div>
            <div class="option">
              <input type="radio" id="q2_b" name="q2" value="B">
              <label for="q2_b">미래를 위해 저축한다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q3 -->
      <section class="question">
        <div class="q-text">끌리는 물건을 봤을 때</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q3_a" name="q3" value="A">
              <label for="q3_a">여유가 있지는 않지만 일단 산다</label>
            </div>
            <div class="option">
              <input type="radio" id="q3_b" name="q3" value="B">
              <label for="q3_b">지금 나에게는 사치라고 생각한다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q4 -->
      <section class="question">
        <div class="q-text">내가 어떤 물건을 사는 이유는?</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q4_a" name="q4" value="A">
              <label for="q4_a">갖고 싶은 마음에</label>
            </div>
            <div class="option">
              <input type="radio" id="q4_b" name="q4" value="B">
              <label for="q4_b">꼭 필요한 물건이라서</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q5 -->
      <section class="question">
        <div class="q-text">"나에게 주는 선물" 을 나는</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q5_a" name="q5" value="A">
              <label for="q5_a">자주 한다</label>
            </div>
            <div class="option">
              <input type="radio" id="q5_b" name="q5" value="B">
              <label for="q5_b">거의 하지 않는다</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q6 -->
      <section class="question">
        <div class="q-text">지름 후 나의 감정은?</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q6_a" name="q6" value="A">
              <label for="q6_a">만족 > 후회</label>
            </div>
            <div class="option">
              <input type="radio" id="q6_b" name="q6" value="B">
              <label for="q6_b">후회 > 만족</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Q7 -->
      <section class="question">
        <div class="q-text">돈을 쓸 때 나의 생각은?</div>
        <div class="answer-box">
          <div class="options">
            <div class="option">
              <input type="radio" id="q7_a" name="q7" value="A">
              <label for="q7_a">'지금 아니면 언제 사?'</label>
            </div>
            <div class="option">
              <input type="radio" id="q7_b" name="q7" value="B">
              <label for="q7_b">'한 번 더 생각하자'</label>
            </div>
          </div>
        </div>
      </section>

      <!-- 하단 네비게이션 -->
      <div class="nav-area">
        <button class="next-btn" type="submit">다음</button>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById("quiz1Form").addEventListener("submit", function(e){
  // 폼 안에 있는 라디오 그룹 이름 목록 추출
  const names = Array.from(new Set(
    Array.from(this.querySelectorAll('input[type="radio"]')).map(r => r.name)
  ));
  // 모든 그룹에 체크가 되었는지 검사
  const allAnswered = names.every(n => this.querySelector(`input[name="${n}"]:checked`));

  if (!allAnswered) {
    e.preventDefault();            // 서버 제출 차단 → 새로고침 없음
    alert("안 푼 문제가 있습니다"); // 브라우저 기본 팝업
    // (선택) 첫 미답변 위치로 스크롤:
    const firstMissing = names.find(n => !this.querySelector(`input[name="${n}"]:checked`));
    if (firstMissing) {
      const el = this.querySelector(`input[name="${firstMissing}"]`);
      el && el.closest('.question')?.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
});
</script>
<script>
  // :has() 미지원 브라우저 대비
  document.querySelectorAll('.options').forEach(group => {
    group.addEventListener('change', e => {
      if (e.target && e.target.type === 'radio') {
        group.querySelectorAll('.option').forEach(o => o.classList.remove('checked'));
        const box = e.target.closest('.option');
        if (box) box.classList.add('checked');
      }
    });
  });
</script>
{% endblock contents %}
